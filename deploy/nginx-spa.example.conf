# Example Nginx config for this Vite + React Router SPA.
#
# Why refresh on /platform/toip shows "404 Not Found" from nginx:
# React Router only runs in the browser after index.html loads. A refresh asks the
# server for the path /platform/toip as if it were a real file. Nginx looks on disk,
# finds nothing, and returns 404. Vite's dev server avoids this by always serving
# the app; production nginx must use try_files to fall back to index.html.
#
# Do NOT use `alias` for /platform alone without try_files — that also yields 404
# for deep links like /platform/toip.
#
# 1. Copy/adjust root to your server path (e.g. where `npm run build` output `dist/` lives).
# 2. Include this server block or merge the `location /` block into your site config.
# 3. Reload nginx: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/technieum/dist;
    index index.html;

    # SPA: unknown paths serve index.html so React Router can route /contact, /services, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: long cache for fingerprinted assets from Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
